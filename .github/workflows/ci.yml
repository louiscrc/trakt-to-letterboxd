name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Smoke test CLI
        run: |
          ttl --help
          ttl --version
          ttl init --non-interactive --config /tmp/config.yml
          test -f /tmp/config.yml
          ttl trakt --help
          python -m trakt_to_letterboxd --help

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Build distributions
        run: |
          pip install build
          python -m build
